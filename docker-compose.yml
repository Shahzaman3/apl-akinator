version: '3.8'

services:
  # Next.js Frontend & Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cricintel-app
    restart: always
    ports:
      - "3333:3000"
    environment:
      - MONGODB_URI=mongodb://db:27017/apl
      - NEXT_PUBLIC_BASE_URL=http://localhost:3333
      # Pass actual Gemini Key externally or via .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY:-""}
    depends_on:
      - db

  # Dedicated MongoDB persistence layer
  db:
    image: mongo:6.0
    container_name: cricintel-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Web-based MongoDB Admin Visual Explorer (Like phpMyAdmin)
  mongo-express:
    image: mongo-express:latest
    container_name: cricintel-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=db
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false # Disable basic auth for seamless local dev access
    depends_on:
      - db

volumes:
  mongo-data:
    driver: local
